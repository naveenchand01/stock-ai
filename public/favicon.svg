<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle inner border glow -->
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.4"/>

  <!-- Candlestick / chart bars (bottom area decoration) -->
  <g opacity="0.25">
    <rect x="80" y="340" width="28" height="80" rx="5" fill="#10b981"/>
    <rect x="124" y="300" width="28" height="120" rx="5" fill="#10b981"/>
    <rect x="168" y="320" width="28" height="100" rx="5" fill="#6366f1"/>
    <rect x="212" y="270" width="28" height="150" rx="5" fill="#10b981"/>
    <rect x="256" y="290" width="28" height="130" rx="5" fill="#10b981"/>
    <rect x="300" y="250" width="28" height="170" rx="5" fill="#6366f1"/>
    <rect x="344" y="230" width="28" height="190" rx="5" fill="#10b981"/>
    <rect x="388" y="260" width="28" height="160" rx="5" fill="#10b981"/>
  </g>

  <!-- Upward trend line -->
  <polyline points="80,400 160,340 240,360 320,290 400,240" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- "AI" text — large, bold, gradient -->
  <text
    x="256"
    y="295"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="220"
    font-weight="900"
    fill="url(#textGrad)"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-8"
  >AI</text>

  <!-- Subtle "MN" small label underneath -->
  <text
    x="256"
    y="410"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="400"
    fill="white"
    text-anchor="middle"
    opacity="0.35"
    letter-spacing="18"
  >MARKET</text>
</svg>
